tracker:
  active_states: ["Todo", "In Progress", "Merging", "Rework"]
  assignee: null
  kind: "linear"
  project_slug: "symphony-cb81294e364c"
  terminal_states: ["Closed", "Cancelled", "Canceled", "Duplicate", "Done"]
polling:
  interval_ms: 5000
workspace:
  root: "~/code/symphony-workspaces"
agent:
  max_concurrent_agents: 10
  max_concurrent_agents_by_state:
    {}
  max_retry_backoff_ms: 300000
  max_turns: 20
codex:
  approval_policy: "never"
  command: "codex --config shell_environment_policy.inherit=all --config model_reasoning_effort=high --model gpt-5.4 app-server"
  read_timeout_ms: 5000
  stall_timeout_ms: 300000
  thread_sandbox: "danger-full-access"
  turn_sandbox_policy:
    type: "dangerFullAccess"
  turn_timeout_ms: 3600000
hooks:
  after_create: |
    git clone --depth 1 https://github.com/eddiearc/symphony .
    cd elixir
    if command -v mise >/dev/null 2>&1; then
      mise trust || true
      if mise exec -- mix deps.get; then
        exit 0
      fi
      echo "mise exec failed; falling back to system mix" >&2
    fi
    if command -v mix >/dev/null 2>&1; then
      HEX_UNSAFE_HTTPS=1 mix deps.get
    else
      echo "mix not found in PATH" >&2
      exit 1
    fi
  timeout_ms: 60000
server:
  host: "127.0.0.1"
  port: null
enabled: true
id: "default"
